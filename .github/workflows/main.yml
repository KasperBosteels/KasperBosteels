name: Update GitLab Stats
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily
  workflow_dispatch: # Allows manual triggering

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitLab Stats
        run: |
          # Fetch total push events (commits)
          COMMITS=$(curl -s "https://gitlab.com/api/v4/users/20097274/events?action=push&per_page=100" | jq 'length')
          echo "GITLAB_COMMITS=$COMMITS" >> $GITHUB_ENV

          # Fetch total merged merge requests
          MRS=$(curl -s "https://gitlab.com/api/v4/users/20097274/merge_requests?state=merged&per_page=100" | jq 'length')
          echo "GITLAB_MRS=$MRS" >> $GITHUB_ENV

      - name: Update README
        run: |
          # Replace placeholders in README.md
          sed -i "s/GITLAB_COMMITS=[0-9]*/GITLAB_COMMITS=$GITLAB_COMMITS/" README.md
          sed -i "s/GITLAB_MRS=[0-9]*/GITLAB_MRS=$GITLAB_MRS/" README.md

          # Commit and push changes
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update GitLab stats"
          git push
